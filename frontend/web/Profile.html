<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile – BetterLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="CSS/app.css">
</head>
<body>

<nav class="app-nav">
    <button type="button" class="toggle-btn" id="sidebarToggle" title="Toggle sidebar">☰</button>
    <a class="brand" href="Feed.html">BetterLink</a>
    <div class="nav-right">
        <span class="user-chip" id="navUserChip"></span>
        <button type="button" class="signout-btn" onclick="signOut()">Sign Out</button>
    </div>
</nav>

<aside class="app-sidebar" id="sidebar">
    <ul class="sidebar-nav" id="sidebarNav"></ul>
    <div class="sidebar-signout">
        <button type="button" onclick="signOut()"><i class="bi bi-box-arrow-left"></i><span>Sign Out</span></button>
    </div>
</aside>

<main class="app-main" id="mainArea">
    <div class="profile-wrap">
        <div class="bl-card p-0 overflow-hidden">
            <div class="profile-banner"></div>
            <div class="profile-avatar-wrap">
                <div class="profile-avatar" id="profileAvatar">?</div>
                <button type="button" class="btn-primary" id="editToggleBtn" onclick="toggleEdit()">Edit Profile</button>
            </div>

            <div class="profile-body">
                <!-- View mode -->
                <div id="viewMode">
                    <div class="profile-name" id="viewName">—</div>
                    <span class="profile-role" id="viewRole"></span>
                    <div class="profile-bio" id="viewBio"></div>

                    <div class="info-section">
                        <h6>Account Information</h6>
                        <div class="info-row"><i class="bi bi-envelope"></i><span id="viewEmail">—</span></div>
                        <div class="info-row"><i class="bi bi-person-badge"></i><span>Display ID: <span id="viewDisplayId">—</span></span></div>
                    </div>

                    <div id="studentInfoSection" class="info-section d-none">
                        <h6>Student Details</h6>
                        <div class="info-row"><i class="bi bi-building"></i><span id="viewUniversity">—</span></div>
                        <div class="info-row"><i class="bi bi-book"></i><span id="viewProgram">—</span></div>
                    </div>

                    <div id="employerInfoSection" class="info-section d-none">
                        <h6>Organisation Details</h6>
                        <div class="info-row"><i class="bi bi-briefcase"></i><span id="viewOrg">—</span></div>
                    </div>

                    <div class="mt-4">
                        <button type="button" class="btn-danger-outline" onclick="confirmDeleteAccount()">Delete Account</button>
                    </div>
                </div>

                <!-- Edit mode -->
                <div id="editMode" class="d-none">
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="editFirstName">First Name</label>
                        <input type="text" class="form-control" id="editFirstName">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="editLastName">Last Name</label>
                        <input type="text" class="form-control" id="editLastName">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="editBio">Bio</label>
                        <textarea class="form-control" id="editBio" rows="3" maxlength="500" placeholder="Tell people about yourself..."></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="button" class="btn-primary" id="saveBtn" onclick="saveProfile()">Save</button>
                        <button type="button" class="btn btn-outline-secondary" onclick="toggleEdit()">Cancel</button>
                    </div>
                    <div class="alert alert-danger mt-3 d-none" id="editError"></div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="js/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
if (!initPage()) { throw new Error('redirect'); }

let profile = null;

function renderProfile(p) {
    const name = [p.firstName, p.lastName].filter(Boolean).join(' ') || p.email;
    document.getElementById('profileAvatar').textContent = initials(p.firstName, p.lastName);
    document.getElementById('viewName').textContent      = name;
    document.getElementById('viewRole').textContent      = p.roles?.[0] || 'User';
    document.getElementById('viewBio').textContent       = p.bio || '';
    document.getElementById('viewEmail').textContent     = p.email || '—';
    document.getElementById('viewDisplayId').textContent = p.displayId || '—';

    if (p.roles?.includes('Student') && p.studentProfile) {
        document.getElementById('studentInfoSection').classList.remove('d-none');
        document.getElementById('viewUniversity').textContent = p.studentProfile.university || '—';
        document.getElementById('viewProgram').textContent    = p.studentProfile.programName || '—';
    }
    if (p.roles?.includes('Employer') && p.employerProfile) {
        document.getElementById('employerInfoSection').classList.remove('d-none');
        document.getElementById('viewOrg').textContent = p.employerProfile.organizationName || '—';
    }
}

function toggleEdit() {
    const isEditing = !document.getElementById('editMode').classList.contains('d-none');
    if (isEditing) {
        document.getElementById('editMode').classList.add('d-none');
        document.getElementById('viewMode').classList.remove('d-none');
        document.getElementById('editToggleBtn').textContent = 'Edit Profile';
    } else {
        document.getElementById('editFirstName').value = profile?.firstName || '';
        document.getElementById('editLastName').value  = profile?.lastName  || '';
        document.getElementById('editBio').value       = profile?.bio       || '';
        document.getElementById('editMode').classList.remove('d-none');
        document.getElementById('viewMode').classList.add('d-none');
        document.getElementById('editToggleBtn').textContent = 'Cancel';
    }
}

async function saveProfile() {
    const btn   = document.getElementById('saveBtn');
    const errEl = document.getElementById('editError');
    btn.disabled = true; btn.textContent = 'Saving...';
    errEl.classList.add('d-none');

    try {
        await apiFetch('/api/users/me', {
            method: 'PUT',
            body: JSON.stringify({
                firstName: document.getElementById('editFirstName').value.trim(),
                lastName:  document.getElementById('editLastName').value.trim(),
                bio:       document.getElementById('editBio').value.trim(),
            }),
        });
        profile = await apiFetch('/api/users/me');
        renderProfile(profile);
        toggleEdit();
    } catch (err) {
        errEl.textContent = err.message || 'Failed to save.';
        errEl.classList.remove('d-none');
    } finally {
        btn.disabled = false; btn.textContent = 'Save';
    }
}

function confirmDeleteAccount() {
    if (!confirm('Permanently delete your account? This cannot be undone.')) return;
    apiFetch('/api/users/me', { method: 'DELETE' })
        .then(() => { clearAuth(); window.location.href = 'Login.html'; })
        .catch(err => alert(err.message || 'Failed to delete account.'));
}

(async () => {
    try {
        profile = await apiFetch('/api/users/me');
        if (profile) renderProfile(profile);
    } catch {
        alert('Could not load profile.');
    }
})();
</script>
</body>
</html>
