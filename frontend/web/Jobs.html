<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Jobs – BetterLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="CSS/app.css">
</head>
<body>

<nav class="app-nav">
    <button type="button" class="toggle-btn" id="sidebarToggle" title="Toggle sidebar">☰</button>
    <a class="brand" href="Feed.html">BetterLink</a>
    <div class="nav-right">
        <span class="user-chip" id="navUserChip"></span>
        <button type="button" class="signout-btn" onclick="signOut()">Sign Out</button>
    </div>
</nav>

<aside class="app-sidebar" id="sidebar">
    <ul class="sidebar-nav" id="sidebarNav"></ul>
    <div class="sidebar-signout">
        <button type="button" onclick="signOut()"><i class="bi bi-box-arrow-left"></i><span>Sign Out</span></button>
    </div>
</aside>

<main class="app-main" id="mainArea">
    <div class="page-header">
        <h4>Browse Jobs</h4>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="Job title, company, or keyword">
        <select id="typeFilter" title="Filter by job type">
            <option value="">All Types</option>
            <option>Full-Time</option>
            <option>Part-Time</option>
            <option>Remote</option>
            <option>Contract</option>
        </select>
        <select id="locationFilter" title="Filter by location">
            <option value="">All Locations</option>
        </select>
        <button type="button" class="btn-outline-primary" id="clearBtn">Clear</button>
    </div>

    <div id="jobsList">
        <div class="spinner-wrap"><div class="spinner-border text-secondary" role="status"></div></div>
    </div>
</main>

<!-- Apply Modal -->
<div class="modal fade" id="applyModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="applyModalTitle">Apply</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-semibold" for="coverLetter">Cover Letter <span class="text-muted fw-normal">(optional)</span></label>
                    <textarea class="form-control" id="coverLetter" rows="5"
                        placeholder="Tell the employer why you're a great fit..."></textarea>
                </div>
                <div class="alert alert-danger d-none" id="applyError"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn-primary" id="applySubmitBtn" onclick="submitApplication()">Submit Application</button>
            </div>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
if (!initPage({ roles: ['Student'] })) { throw new Error('redirect'); }

let allJobs = [];
let activeJobId = null;

async function loadJobs() {
    try {
        allJobs = await apiFetch('/api/jobs') || [];
        populateLocations();
        renderJobs(allJobs);
    } catch (err) {
        document.getElementById('jobsList').innerHTML = `<div class="alert alert-danger">${escHtml(err.message)}</div>`;
    }
}

function populateLocations() {
    const sel = document.getElementById('locationFilter');
    const locs = [...new Set(allJobs.map(j => j.location).filter(Boolean))].sort();
    sel.innerHTML = '<option value="">All Locations</option>' +
        locs.map(l => `<option>${escHtml(l)}</option>`).join('');
}

function renderJobs(jobs) {
    const el = document.getElementById('jobsList');
    if (jobs.length === 0) {
        el.innerHTML = `<div class="bl-card text-center text-muted py-5">
            <i class="bi bi-briefcase fs-1 d-block mb-2"></i>No jobs match your filters.</div>`;
        return;
    }
    el.innerHTML = jobs.map(j => `
        <div class="job-card">
            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-1">
                <div>
                    <div class="job-title">${escHtml(j.title)}</div>
                    <div class="job-company">${escHtml(j.employerName || '')}</div>
                </div>
                <span class="badge-type">${escHtml(j.employmentType || 'Full-Time')}</span>
            </div>
            <div class="job-meta">
                <span><i class="bi bi-geo-alt"></i>${escHtml(j.location || 'N/A')}</span>
                <span><i class="bi bi-calendar"></i>${j.postedDate ? new Date(j.postedDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : ''}</span>
            </div>
            <div class="job-desc">${escHtml((j.description || '').substring(0, 200))}${(j.description || '').length > 200 ? '...' : ''}</div>
            <button type="button" class="btn-primary btn-pill" onclick="openApply(${j.id}, '${escHtml(j.title)}')">Apply Now</button>
        </div>`).join('');
}

function applyFilters() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const type   = document.getElementById('typeFilter').value;
    const loc    = document.getElementById('locationFilter').value;
    renderJobs(allJobs.filter(j =>
        (!search || j.title?.toLowerCase().includes(search) || j.employerName?.toLowerCase().includes(search) || j.description?.toLowerCase().includes(search)) &&
        (!type   || j.employmentType === type) &&
        (!loc    || j.location === loc)
    ));
}

function openApply(jobId, title) {
    activeJobId = jobId;
    document.getElementById('applyModalTitle').textContent = `Apply — ${title}`;
    document.getElementById('coverLetter').value = '';
    document.getElementById('applyError').classList.add('d-none');
    document.getElementById('applySubmitBtn').disabled = false;
    document.getElementById('applySubmitBtn').textContent = 'Submit Application';
    new bootstrap.Modal(document.getElementById('applyModal')).show();
}

async function submitApplication() {
    const btn   = document.getElementById('applySubmitBtn');
    const errEl = document.getElementById('applyError');
    btn.disabled = true; btn.textContent = 'Submitting...';
    errEl.classList.add('d-none');
    try {
        await apiFetch(`/api/jobs/${activeJobId}/apply`, {
            method: 'POST',
            body: JSON.stringify({ coverLetter: document.getElementById('coverLetter').value.trim() }),
        });
        bootstrap.Modal.getInstance(document.getElementById('applyModal')).hide();
        alert('Application submitted successfully!');
    } catch (err) {
        errEl.textContent = err.message || 'Failed to submit.';
        errEl.classList.remove('d-none');
        btn.disabled = false; btn.textContent = 'Submit Application';
    }
}

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('typeFilter').addEventListener('change', applyFilters);
document.getElementById('locationFilter').addEventListener('change', applyFilters);
document.getElementById('clearBtn').addEventListener('click', () => {
    document.getElementById('searchInput').value = '';
    document.getElementById('typeFilter').value = '';
    document.getElementById('locationFilter').value = '';
    applyFilters();
});

loadJobs();
</script>
</body>
</html>
