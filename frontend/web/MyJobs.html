<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Jobs – BetterLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="CSS/app.css">
</head>
<body>

<nav class="app-nav">
    <button type="button" class="toggle-btn" id="sidebarToggle" title="Toggle sidebar">☰</button>
    <a class="brand" href="Feed.html">BetterLink</a>
    <div class="nav-right">
        <span class="user-chip" id="navUserChip"></span>
        <button type="button" class="signout-btn" onclick="signOut()">Sign Out</button>
    </div>
</nav>

<aside class="app-sidebar" id="sidebar">
    <ul class="sidebar-nav" id="sidebarNav"></ul>
    <div class="sidebar-signout">
        <button type="button" onclick="signOut()"><i class="bi bi-box-arrow-left"></i><span>Sign Out</span></button>
    </div>
</aside>

<main class="app-main" id="mainArea">
    <div class="page-header">
        <h4>My Job Listings</h4>
        <a href="JobPost.html" class="btn-primary btn-pill">
            <i class="bi bi-plus-circle me-1"></i>Post New Job
        </a>
    </div>

    <div id="jobsList">
        <div class="spinner-wrap"><div class="spinner-border text-secondary" role="status"></div></div>
    </div>
</main>

<!-- Applicants Modal -->
<div class="modal fade" id="applicantsModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="applicantsModalTitle">Applicants</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="applicantsBody">
                <p class="text-center text-muted py-4">Loading...</p>
            </div>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
if (!initPage({ roles: ['Employer'] })) { throw new Error('redirect'); }

let activeJobId = null;

async function loadMyJobs() {
    const container = document.getElementById('jobsList');
    try {
        const jobs = await apiFetch('/api/jobs/mine') || [];
        if (jobs.length === 0) {
            container.innerHTML = `
                <div class="bl-card text-center text-muted py-5">
                    <i class="bi bi-briefcase fs-1 d-block mb-2"></i>
                    You haven't posted any jobs yet.
                    <div class="mt-3"><a href="JobPost.html" class="btn-primary btn-pill">Post your first job</a></div>
                </div>`;
            return;
        }

        container.innerHTML = jobs.map(j => `
            <div class="job-card" id="myjob-${j.id}">
                <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                    <div>
                        <div class="job-title">${escHtml(j.title)}</div>
                        <div class="job-meta">
                            <span><i class="bi bi-geo-alt"></i>${escHtml(j.location || 'N/A')}</span>
                            <span><i class="bi bi-clock"></i>${escHtml(j.employmentType || '')}</span>
                            <span><i class="bi bi-calendar"></i>${j.postedDate ? new Date(j.postedDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : ''}</span>
                        </div>
                    </div>
                    <div class="d-flex gap-2 align-items-center flex-wrap">
                        <span class="${j.status === 'open' ? 'badge-status-open' : 'badge-status-closed'}">${j.status}</span>
                        <button type="button" class="btn btn-outline-secondary btn-sm"
                            onclick="openApplicants(${j.id}, '${escHtml(j.title)}')">
                            <i class="bi bi-people me-1"></i>${j.applicantCount} Applicant${j.applicantCount !== 1 ? 's' : ''}
                        </button>
                        <button type="button" class="btn btn-outline-danger btn-sm" onclick="deleteJob(${j.id})" title="Delete job">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
                <div class="job-desc mt-2">${escHtml((j.description || '').substring(0, 200))}${(j.description?.length || 0) > 200 ? '...' : ''}</div>
            </div>`).join('');
    } catch (err) {
        container.innerHTML = `<div class="alert alert-danger">${escHtml(err.message)}</div>`;
    }
}

async function deleteJob(jobId) {
    if (!confirm('Delete this job listing? This cannot be undone.')) return;
    try {
        await apiFetch(`/api/jobs/${jobId}`, { method: 'DELETE' });
        document.getElementById(`myjob-${jobId}`)?.remove();
    } catch (err) { alert(err.message); }
}

async function openApplicants(jobId, jobTitle) {
    activeJobId = jobId;
    document.getElementById('applicantsModalTitle').textContent = `Applicants — ${jobTitle}`;
    document.getElementById('applicantsBody').innerHTML = '<p class="text-center text-muted py-4">Loading...</p>';
    const modal = new bootstrap.Modal(document.getElementById('applicantsModal'));
    modal.show();
    await loadApplicants(jobId);
}

async function loadApplicants(jobId) {
    const body = document.getElementById('applicantsBody');
    try {
        const applicants = await apiFetch(`/api/jobs/${jobId}/applicants`) || [];
        if (applicants.length === 0) {
            body.innerHTML = '<p class="text-center text-muted py-4">No applicants yet.</p>';
            return;
        }
        body.innerHTML = `<div class="table-responsive"><table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>Name</th><th>University</th><th>Program</th><th>GPA</th><th>Grad Year</th><th>Status</th><th>Actions</th>
                </tr>
            </thead>
            <tbody>
                ${applicants.map(a => `
                <tr id="app-row-${a.applicationId}">
                    <td>
                        <div class="fw-semibold">${escHtml(a.firstName)} ${escHtml(a.lastName)}</div>
                        <small class="text-muted">${escHtml(a.email)}</small>
                    </td>
                    <td>${escHtml(a.university || '—')}</td>
                    <td>${escHtml(a.programName || '—')}</td>
                    <td>${a.gpa != null ? a.gpa.toFixed(2) : '—'}</td>
                    <td>${a.graduationYear || '—'}</td>
                    <td><span class="badge-${a.status}" id="app-status-${a.applicationId}">${a.status}</span></td>
                    <td>
                        ${a.status === 'submitted' ? `
                        <div class="d-flex gap-1">
                            <button type="button" class="btn btn-success btn-sm" onclick="updateStatus(${a.applicationId}, 'accepted')">
                                <i class="bi bi-check-lg"></i> Hire
                            </button>
                            <button type="button" class="btn btn-danger btn-sm" onclick="updateStatus(${a.applicationId}, 'rejected')">
                                <i class="bi bi-x-lg"></i> Reject
                            </button>
                        </div>` : '<span class="text-muted small">Decided</span>'}
                        ${a.resumeUrl ? `<a href="${escHtml(a.resumeUrl)}" target="_blank" class="btn btn-outline-secondary btn-sm ms-1"><i class="bi bi-file-text"></i></a>` : ''}
                    </td>
                </tr>`).join('')}
            </tbody>
        </table></div>`;
    } catch (err) { body.innerHTML = `<div class="alert alert-danger">${escHtml(err.message)}</div>`; }
}

async function updateStatus(applicationId, status) {
    const verb = status === 'accepted' ? 'hire' : 'reject';
    if (!confirm(`Are you sure you want to ${verb} this applicant?`)) return;
    try {
        await apiFetch(`/api/jobs/${activeJobId}/applicants/${applicationId}/status`, {
            method: 'PUT',
            body: JSON.stringify({ status }),
        });
        const badge = document.getElementById(`app-status-${applicationId}`);
        if (badge) { badge.textContent = status; badge.className = `badge-${status}`; }
        const row = document.getElementById(`app-row-${applicationId}`);
        const td  = row?.querySelector('td:last-child');
        if (td) td.innerHTML = '<span class="text-muted small">Decided</span>';
    } catch (err) { alert(err.message); }
}

loadMyJobs();
</script>
</body>
</html>
