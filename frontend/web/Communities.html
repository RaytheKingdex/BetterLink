<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Communities – BetterLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="CSS/app.css">
</head>
<body>

<nav class="app-nav">
    <button type="button" class="toggle-btn" id="sidebarToggle" title="Toggle sidebar">☰</button>
    <a class="brand" href="Feed.html">BetterLink</a>
    <div class="nav-right">
        <span class="user-chip" id="navUserChip"></span>
        <button type="button" class="signout-btn" onclick="signOut()">Sign Out</button>
    </div>
</nav>

<aside class="app-sidebar" id="sidebar">
    <ul class="sidebar-nav" id="sidebarNav"></ul>
    <div class="sidebar-signout">
        <button type="button" onclick="signOut()"><i class="bi bi-box-arrow-left"></i><span>Sign Out</span></button>
    </div>
</aside>

<main class="app-main" id="mainArea">
    <div class="page-header">
        <h4>Communities</h4>
        <button type="button" class="btn-primary" onclick="openCreateModal()">
            <i class="bi bi-plus-circle me-1"></i>New Community
        </button>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar mb-3">
        <input type="text" id="searchInput" placeholder="Search communities...">
        <select id="tabFilter" title="Filter" onchange="applyTab()">
            <option value="all">All Communities</option>
            <option value="mine">My Communities</option>
        </select>
    </div>

    <!-- Community list -->
    <div id="communityList">
        <div class="spinner-wrap"><div class="spinner-border text-secondary" role="status"></div></div>
    </div>
</main>

<!-- Create Community Modal -->
<div class="modal fade" id="communityModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">Create a New Community</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-semibold" for="communityName">Community Name</label>
                    <input type="text" class="form-control" id="communityName" placeholder="e.g. TechTalks">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold" for="communityDesc">Description</label>
                    <textarea class="form-control" id="communityDesc" rows="4" placeholder="What is this community about?"></textarea>
                </div>
                <div class="alert alert-danger d-none" id="createError"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn-primary" id="createCommunityBtn" onclick="createCommunity()">Create</button>
            </div>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
if (!initPage({ roles: ['Student'] })) { throw new Error('redirect'); }

let allCommunities = [];

function renderCommunities(list) {
    const container = document.getElementById('communityList');
    if (list.length === 0) {
        container.innerHTML = '<div class="bl-card text-center text-muted py-5"><i class="bi bi-people fs-1 d-block mb-2"></i>No communities found.</div>';
        return;
    }
    container.innerHTML = list.map(c => `
        <div class="community-card">
            <div class="c-icon"><i class="bi bi-people-fill"></i></div>
            <div class="flex-grow-1">
                <div class="c-name">${escHtml(c.name)}</div>
                <div class="c-meta">${c.memberCount} member${c.memberCount !== 1 ? 's' : ''}</div>
                <div class="c-desc">${escHtml(c.description || '')}</div>
            </div>
            <div class="c-actions">
                <button type="button" class="btn-join${c.isMember ? ' joined' : ''}"
                    onclick="joinCommunity(${c.id}, this)"
                    ${c.isMember ? 'disabled' : ''}>${c.isMember ? 'Joined' : 'Join'}</button>
            </div>
        </div>`).join('');
}

async function joinCommunity(id, btn) {
    btn.disabled = true;
    btn.textContent = 'Joining...';
    try {
        await apiFetch(`/api/communities/${id}/join`, { method: 'POST' });
        btn.textContent = 'Joined';
        btn.classList.add('joined');
        const c = allCommunities.find(x => x.id === id);
        if (c) { c.isMember = true; c.memberCount++; }
    } catch (err) {
        alert(err.message || 'Could not join community.');
        btn.disabled = false;
        btn.textContent = 'Join';
    }
}

async function createCommunity() {
    const name = document.getElementById('communityName').value.trim();
    const desc = document.getElementById('communityDesc').value.trim();
    const errEl = document.getElementById('createError');
    errEl.classList.add('d-none');
    if (!name) { errEl.textContent = 'Please enter a community name.'; errEl.classList.remove('d-none'); return; }

    const btn = document.getElementById('createCommunityBtn');
    btn.disabled = true; btn.textContent = 'Creating...';

    try {
        await apiFetch('/api/communities', { method: 'POST', body: JSON.stringify({ name, description: desc }) });
        bootstrap.Modal.getInstance(document.getElementById('communityModal')).hide();
        document.getElementById('communityName').value = '';
        document.getElementById('communityDesc').value = '';
        await loadCommunities();
    } catch (err) {
        errEl.textContent = err.message || 'Failed to create community.';
        errEl.classList.remove('d-none');
    } finally {
        btn.disabled = false; btn.textContent = 'Create';
    }
}

async function loadCommunities() {
    try {
        allCommunities = await apiFetch('/api/communities') || [];
        applyTab();
    } catch {
        document.getElementById('communityList').innerHTML =
            '<div class="bl-card text-center text-danger py-5">Failed to load communities.</div>';
    }
}

function applyTab() {
    const tab    = document.getElementById('tabFilter').value;
    const search = document.getElementById('searchInput').value.toLowerCase();
    let list = tab === 'mine' ? allCommunities.filter(c => c.isMember) : allCommunities;
    if (search) list = list.filter(c => c.name.toLowerCase().includes(search) || (c.description || '').toLowerCase().includes(search));
    renderCommunities(list);
}

function openCreateModal() {
    document.getElementById('createError').classList.add('d-none');
    new bootstrap.Modal(document.getElementById('communityModal')).show();
}

document.getElementById('searchInput').addEventListener('input', applyTab);

loadCommunities();
</script>
</body>
</html>
