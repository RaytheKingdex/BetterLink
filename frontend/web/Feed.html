<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed – BetterLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="CSS/app.css">
</head>
<body>

<nav class="app-nav">
    <button class="toggle-btn" id="sidebarToggle" title="Toggle sidebar">☰</button>
    <a class="brand" href="Feed.html">BetterLink</a>
    <div class="nav-right">
        <span class="user-chip" id="navUserChip"></span>
        <button class="signout-btn" onclick="signOut()">Sign Out</button>
    </div>
</nav>

<aside class="app-sidebar" id="sidebar">
    <ul class="sidebar-nav" id="sidebarNav"></ul>
    <div class="sidebar-signout">
        <button onclick="signOut()"><i class="bi bi-box-arrow-left"></i><span>Sign Out</span></button>
    </div>
</aside>

<main class="app-main" id="mainArea">
    <div class="feed-col">

        <!-- Compose box -->
        <div class="bl-card compose-box" id="composeBox">
            <textarea id="postText" rows="3" placeholder="What's on your mind?"></textarea>
            <div class="media-preview" id="mediaPreview"></div>
            <div class="compose-footer">
                <button type="button" class="btn-outline-primary" onclick="pickMedia()" id="attachBtn">
                    <i class="bi bi-paperclip"></i> Attach
                </button>
                <input type="file" id="mediaInput" accept="image/*,video/*" multiple
                    class="file-input-hidden" title="Attach media" onchange="previewMedia(event)">
                <button type="button" class="btn-primary btn-pill" id="postBtn" onclick="submitPost()">Post</button>
            </div>
        </div>

        <!-- Feed list -->
        <div id="feedList">
            <div class="spinner-wrap"><div class="spinner-border text-secondary" role="status"></div></div>
        </div>
        <div class="text-center py-3 hidden" id="loadMoreRow">
            <button type="button" class="btn-outline-primary" onclick="loadMore()">Load more</button>
        </div>
    </div>
</main>

<!-- Comment Modal -->
<div class="modal fade" id="commentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title fw-bold">Comments</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-0">
                <div class="comment-sheet">
                    <div class="comment-list" id="commentList">
                        <p class="text-center text-muted py-4">Loading...</p>
                    </div>
                    <div class="comment-input-row">
                        <input type="text" id="commentInput" placeholder="Write a comment..." maxlength="500">
                        <button type="button" class="btn-primary btn-pill px-3" onclick="submitComment()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
if (!initPage()) { throw new Error('redirect'); }

const user = getUser();
let page = 1;
const PAGE_SIZE = 20;
let hasMore = true;
let activeCommentPostId = null;
let draftMedia = [];

// ── Load feed ──────────────────────────────────────────────────────────────────
async function loadFeed(append = false) {
    try {
        const posts = await apiFetch(`/api/feed?page=${page}&pageSize=${PAGE_SIZE}`);
        if (!posts) return;
        hasMore = posts.length === PAGE_SIZE;
        document.getElementById('loadMoreRow').classList.toggle('hidden', !hasMore);

        if (!append) document.getElementById('feedList').innerHTML = '';
        if (posts.length === 0 && !append) {
            document.getElementById('feedList').innerHTML = `
                <div class="bl-card text-center text-muted py-5">
                    <i class="bi bi-newspaper fs-1 d-block mb-2"></i>No posts yet. Be the first to post!
                </div>`;
            return;
        }
        posts.forEach(p => document.getElementById('feedList').insertAdjacentHTML('beforeend', renderPost(p)));
    } catch (err) {
        document.getElementById('feedList').innerHTML = `<div class="alert alert-danger">${escHtml(err.message)}</div>`;
    }
}

function renderPost(p) {
    const isOwn = p.authorId === user?.userId;
    const name  = [p.authorFirstName, p.authorLastName].filter(Boolean).join(' ') || 'User';
    const media = (p.media || []).map(m => {
        const url = m.url.startsWith('/') ? `${BASE_URL}${m.url}` : m.url;
        if (m.mediaType === 'video') return `<div class="vid-thumb"><i class="bi bi-play-circle fs-3"></i><span>Video</span></div>`;
        return `<img src="${escHtml(url)}" alt="media" loading="lazy">`;
    }).join('');

    return `
    <div class="bl-card post-card" id="post-${p.id}">
        <div class="post-header">
            <div class="post-avatar">${initials(p.authorFirstName, p.authorLastName)}</div>
            <div>
                <div class="post-author">${escHtml(name)}</div>
                <div class="post-time">${fmtDate(p.createdAt)}</div>
            </div>
        </div>
        ${p.content ? `<div class="post-body">${escHtml(p.content)}</div>` : ''}
        ${media ? `<div class="post-media">${media}</div>` : ''}
        <div class="post-actions">
            <button type="button" class="action-btn ${p.likedByMe ? 'liked' : ''}" id="like-${p.id}" onclick="toggleLike(${p.id})">
                <i class="bi ${p.likedByMe ? 'bi-heart-fill' : 'bi-heart'}"></i>
                <span id="likeCount-${p.id}">${p.likeCount || ''}</span>
            </button>
            <button type="button" class="action-btn" onclick="openComments(${p.id})">
                <i class="bi bi-chat"></i>
                <span>${p.commentCount > 0 ? p.commentCount : ''}</span>
            </button>
            ${isOwn ? `<button type="button" class="action-btn delete-btn" onclick="deletePost(${p.id})"><i class="bi bi-trash"></i></button>` : ''}
        </div>
    </div>`;
}

function loadMore() { page++; loadFeed(true); }

// ── Like ───────────────────────────────────────────────────────────────────────
async function toggleLike(postId) {
    const btn  = document.getElementById(`like-${postId}`);
    const span = document.getElementById(`likeCount-${postId}`);
    const wasLiked = btn.classList.contains('liked');

    btn.classList.toggle('liked');
    btn.querySelector('i').className = `bi ${wasLiked ? 'bi-heart' : 'bi-heart-fill'}`;
    span.textContent = String((parseInt(span.textContent || '0') || 0) + (wasLiked ? -1 : 1)) || '';

    try {
        const res = await apiFetch(`/api/feed/${postId}/like`, { method: 'POST' });
        if (res) span.textContent = res.likeCount || '';
    } catch {
        btn.classList.toggle('liked');
        btn.querySelector('i').className = `bi ${wasLiked ? 'bi-heart-fill' : 'bi-heart'}`;
    }
}

// ── Delete post ────────────────────────────────────────────────────────────────
async function deletePost(postId) {
    if (!confirm('Delete this post? This cannot be undone.')) return;
    try {
        await apiFetch(`/api/feed/${postId}`, { method: 'DELETE' });
        document.getElementById(`post-${postId}`)?.remove();
    } catch (err) { alert(err.message); }
}

// ── Create post ────────────────────────────────────────────────────────────────
function pickMedia() { document.getElementById('mediaInput').click(); }

function previewMedia(event) {
    const files = Array.from(event.target.files);
    draftMedia = [...draftMedia, ...files].slice(0, 4);
    renderMediaPreviews();
    event.target.value = '';
}

function removeMedia(i) { draftMedia.splice(i, 1); renderMediaPreviews(); }

function renderMediaPreviews() {
    const preview = document.getElementById('mediaPreview');
    preview.innerHTML = draftMedia.map((f, i) => {
        const url = URL.createObjectURL(f);
        const thumb = f.type.startsWith('video')
            ? `<div class="vid-prev"><i class="bi bi-play-circle"></i></div>`
            : `<img src="${url}" alt="preview">`;
        return `<div class="prev-tile">${thumb}<button type="button" class="rm-btn" onclick="removeMedia(${i})">✕</button></div>`;
    }).join('');
    document.getElementById('attachBtn').innerHTML = draftMedia.length > 0
        ? `<i class="bi bi-paperclip"></i> ${draftMedia.length}/4`
        : `<i class="bi bi-paperclip"></i> Attach`;
}

async function submitPost() {
    const text = document.getElementById('postText').value.trim();
    if (!text && draftMedia.length === 0) return;

    const btn = document.getElementById('postBtn');
    btn.disabled = true; btn.textContent = 'Posting...';

    try {
        const fd = new FormData();
        fd.append('content', text);
        draftMedia.forEach(f => fd.append('media', f));

        const newPost = await apiFetch('/api/feed', { method: 'POST', body: fd });
        if (newPost) {
            document.getElementById('postText').value = '';
            draftMedia = [];
            renderMediaPreviews();
            document.getElementById('feedList').insertAdjacentHTML('afterbegin', renderPost(newPost));
        }
    } catch (err) { alert(err.message); }
    finally { btn.disabled = false; btn.textContent = 'Post'; }
}

// ── Comments ───────────────────────────────────────────────────────────────────
async function openComments(postId) {
    activeCommentPostId = postId;
    document.getElementById('commentList').innerHTML = '<p class="text-center text-muted py-4">Loading...</p>';
    document.getElementById('commentInput').value = '';
    const modal = new bootstrap.Modal(document.getElementById('commentModal'));
    modal.show();
    await refreshComments();
}

async function refreshComments() {
    if (!activeCommentPostId) return;
    try {
        const comments = await apiFetch(`/api/feed/${activeCommentPostId}/comments`) || [];
        const list = document.getElementById('commentList');
        if (comments.length === 0) {
            list.innerHTML = '<p class="text-center text-muted py-4">No comments yet. Be the first!</p>';
            return;
        }
        list.innerHTML = comments.map(c => {
            const isOwn = c.authorId === user?.userId;
            const name  = [c.authorFirstName, c.authorLastName].filter(Boolean).join(' ') || 'User';
            return `
            <div class="comment-item" id="comment-${c.id}">
                <div class="comment-avatar">${initials(c.authorFirstName, c.authorLastName)}</div>
                <div class="comment-bubble">
                    <div class="comment-author">${escHtml(isOwn ? 'You' : name)}</div>
                    <div class="comment-body">${escHtml(c.body)}</div>
                    <div class="comment-time">${fmtDate(c.createdAt)}</div>
                </div>
                ${isOwn ? `<button type="button" class="action-btn delete-btn" style="align-self:flex-start" onclick="deleteComment(${c.id})"><i class="bi bi-trash-fill"></i></button>` : ''}
            </div>`;
        }).join('');
    } catch (err) {
        document.getElementById('commentList').innerHTML = `<p class="text-danger text-center">${escHtml(err.message)}</p>`;
    }
}

async function submitComment() {
    const input = document.getElementById('commentInput');
    const text  = input.value.trim();
    if (!text || !activeCommentPostId) return;
    input.value = '';
    try {
        await apiFetch(`/api/feed/${activeCommentPostId}/comments`, {
            method: 'POST',
            body: JSON.stringify({ body: text }),
        });
        await refreshComments();
    } catch (err) { alert(err.message); input.value = text; }
}

async function deleteComment(commentId) {
    if (!confirm('Delete this comment?')) return;
    try {
        await apiFetch(`/api/feed/${activeCommentPostId}/comments/${commentId}`, { method: 'DELETE' });
        document.getElementById(`comment-${commentId}`)?.remove();
    } catch (err) { alert(err.message); }
}

document.getElementById('commentInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitComment(); }
});

loadFeed();
</script>
</body>
</html>
