<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job – BetterLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="CSS/app.css">
</head>
<body>

<nav class="app-nav">
    <button type="button" class="toggle-btn" id="sidebarToggle" title="Toggle sidebar">☰</button>
    <a class="brand" href="Feed.html">BetterLink</a>
    <div class="nav-right">
        <span class="user-chip" id="navUserChip"></span>
        <button type="button" class="signout-btn" onclick="signOut()">Sign Out</button>
    </div>
</nav>

<aside class="app-sidebar" id="sidebar">
    <ul class="sidebar-nav" id="sidebarNav"></ul>
    <div class="sidebar-signout">
        <button type="button" onclick="signOut()"><i class="bi bi-box-arrow-left"></i><span>Sign Out</span></button>
    </div>
</aside>

<main class="app-main" id="mainArea">
    <div class="profile-wrap">
        <div class="page-header">
            <h4>Post a New Job</h4>
        </div>

        <div class="bl-card">
            <form id="postJobForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold" for="jobTitle">Job Title</label>
                    <input type="text" class="form-control" id="jobTitle" required placeholder="e.g. Software Engineer">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold" for="location">Location</label>
                    <input type="text" class="form-control" id="location" placeholder="e.g. New York, USA or Remote" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold" for="jobType">Job Type</label>
                    <select class="form-select" id="jobType">
                        <option value="Full-Time">Full-Time</option>
                        <option value="Part-Time">Part-Time</option>
                        <option value="Remote">Remote</option>
                        <option value="Contract">Contract</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold" for="jobDescription">Job Description</label>
                    <textarea class="form-control" id="jobDescription" rows="6" required></textarea>
                </div>

                <div class="alert alert-danger d-none" id="postError"></div>

                <button type="submit" class="btn-primary w-100">Post Job</button>
            </form>
        </div>
    </div>
</main>

<script src="js/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
if (!initPage({ roles: ['Employer'] })) { throw new Error('redirect'); }

document.getElementById('postJobForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const btn   = this.querySelector('button[type="submit"]');
    const errEl = document.getElementById('postError');
    btn.disabled = true; btn.textContent = 'Posting...';
    errEl.classList.add('d-none');

    try {
        await apiFetch('/api/jobs', {
            method: 'POST',
            body: JSON.stringify({
                title:          document.getElementById('jobTitle').value.trim(),
                location:       document.getElementById('location').value.trim(),
                employmentType: document.getElementById('jobType').value,
                description:    document.getElementById('jobDescription').value.trim(),
            }),
        });
        alert('Job posted successfully!');
        window.location.href = 'MyJobs.html';
    } catch (err) {
        errEl.textContent = err.message || 'Failed to post job.';
        errEl.classList.remove('d-none');
        btn.disabled = false; btn.textContent = 'Post Job';
    }
});
</script>
</body>
</html>
