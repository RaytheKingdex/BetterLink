<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - BetterLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/public.css">
</head>
<body>

<nav class="pub-nav">
    <a class="brand" href="Home.html">BetterLink</a>
    <ul class="nav-links">
        <li><a href="Home.html">Home</a></li>
        <li><a href="Service.html">Services</a></li>
        <li><a href="About Us.html">About Us</a></li>
        <li><a href="ContactUs.html">Contact Us</a></li>
    </ul>
    <div class="nav-actions">
        <a href="Login.html" class="btn-ghost">Login</a>
    </div>
</nav>

<div class="auth-wrap">
    <div class="auth-card auth-card-wide">
        <h2>Create Account</h2>
        <p class="auth-sub">Join BetterLink and start your journey</p>

        <div class="auth-error" id="signupError"></div>

        <form id="signupForm">
            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label for="firstName">First Name</label>
                    <input type="text" class="form-control" id="firstName" placeholder="First Name" required>
                </div>
                <div class="col-6">
                    <label for="lastName">Last Name</label>
                    <input type="text" class="form-control" id="lastName" placeholder="Last Name" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="email">Email</label>
                <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
            </div>

            <div class="mb-3">
                <label for="occupationSelect">I am a…</label>
                <select class="form-select" id="occupationSelect" required>
                    <option value="" disabled selected>Select role</option>
                    <option value="Student">Student</option>
                    <option value="Employer">Employer</option>
                </select>
            </div>

            <!-- Student fields -->
            <div id="studentFields" class="role-fields">
                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label for="university">University</label>
                        <input type="text" class="form-control" id="university" placeholder="e.g. UWI">
                    </div>
                    <div class="col-6">
                        <label for="programName">Program / Major</label>
                        <input type="text" class="form-control" id="programName" placeholder="e.g. Computer Science">
                    </div>
                </div>
            </div>

            <!-- Employer fields -->
            <div id="employerFields" class="role-fields mb-3">
                <label for="organizationName">Organisation Name</label>
                <input type="text" class="form-control" id="organizationName" placeholder="e.g. Acme Corp">
            </div>

            <div class="mb-3">
                <label for="password">Password</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="password" placeholder="Min. 8 characters" required>
                    <button type="button" class="btn btn-outline-secondary" id="togglePassword" title="Toggle password visibility">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div class="mb-3">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat password" required>
            </div>

            <p class="auth-hint">Already have an account? <a href="Login.html" class="auth-link">Login</a></p>

            <button type="submit" class="btn-auth" id="submitBtn">Create Account</button>
        </form>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    if (getToken()) window.location.replace('Feed.html');

    document.getElementById('togglePassword').addEventListener('click', () => {
        const field = document.getElementById('password');
        const icon  = document.getElementById('eyeIcon');
        if (field.type === 'password') {
            field.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            field.type = 'password';
            icon.className = 'bi bi-eye';
        }
    });

    document.getElementById('occupationSelect').addEventListener('change', function () {
        document.getElementById('studentFields').style.display  = this.value === 'Student'  ? '' : 'none';
        document.getElementById('employerFields').style.display = this.value === 'Employer' ? '' : 'none';
    });

    document.getElementById('signupForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const firstName = document.getElementById('firstName').value.trim();
        const lastName  = document.getElementById('lastName').value.trim();
        const email     = document.getElementById('email').value.trim();
        const password  = document.getElementById('password').value;
        const confirm   = document.getElementById('confirmPassword').value;
        const role      = document.getElementById('occupationSelect').value;
        const errEl     = document.getElementById('signupError');
        errEl.classList.remove('show');

        if (!role)                      { errEl.textContent = 'Please select a role.';              errEl.classList.add('show'); return; }
        if (password !== confirm)       { errEl.textContent = 'Passwords do not match.';            errEl.classList.add('show'); return; }
        if (password.length < 8)        { errEl.textContent = 'Password must be at least 8 chars.'; errEl.classList.add('show'); return; }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.textContent = 'Creating account...';

        try {
            const fullName = `${firstName} ${lastName}`.trim();
            let body, endpoint;

            if (role === 'Student') {
                endpoint = '/api/auth/register/student';
                body = {
                    email, password, fullName,
                    university:  document.getElementById('university').value.trim()  || 'N/A',
                    programName: document.getElementById('programName').value.trim() || 'N/A',
                };
            } else {
                endpoint = '/api/auth/register/employer';
                body = {
                    email, password, fullName,
                    organizationName: document.getElementById('organizationName').value.trim() || fullName,
                };
            }

            const result = await apiFetch(endpoint, { method: 'POST', body: JSON.stringify(body) });
            if (!result) return;

            setAuth(result.token, {
                userId:    result.userId,
                email:     result.email,
                role:      result.role,
                firstName: firstName,
            });

            window.location.replace('Feed.html');
        } catch (err) {
            errEl.textContent = err.message || 'Registration failed. Please try again.';
            errEl.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Create Account';
        }
    });
</script>
</body>
</html>
