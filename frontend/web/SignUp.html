<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f4f4;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .registration-wrapper {
            max-width: 1100px;
            margin: 40px auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .header {
            background: #1a1a1a;
            color: white;
            padding: 18px;
            text-align: center;
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .main-content {
            display: flex;
        }
        .form-side {
            flex: 1;
            padding: 40px 50px;
            background: white;
        }
        .image-side {
            flex: 1;
            background: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f') center/cover no-repeat;
            min-height: 620px;
            position: relative;
        }
        .image-side::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to right, rgba(255,255,255,0.05), transparent);
        }
        label {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            color: #333;
            margin-bottom: 6px;
            display: block;
        }
        .form-control {
            border: 2px solid #007bff;
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 1rem;
        }
        .form-control:focus {
            border-color: #0056b3;
            box-shadow: 0 0 0 0.2rem rgba(0,123,255,0.25);
        }
        .password-wrapper {
            position: relative;
        }
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-20%);
            cursor: pointer;
            color: #666;
            font-size: 1.3rem;
        }
        .min-char {
            color: #c00;
            font-size: 0.8rem;
            margin-top: 4px;
        }
        .radio-group {
            display: flex;
            gap: 30px;
            margin-top: 8px;
        }
        .btn-submit {
            background: #8B0000;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 14px;
            border: none;
            border-radius: 6px;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .btn-submit:hover {
            background: #a00000;
            transform: translateY(-2px);
        }
    </style>
    <link rel="stylesheet" href="CSS/footer.css">
</head>
<body>

<div class="registration-wrapper">
    <!-- Dark Header -->
    <div class="header">REGISTRATION FORM</div>

    <div class="main-content">
        <!-- Form Side -->
        <div class="form-side">
            <div class="alert d-none" id="signupStatus" role="alert"></div>
            <form id="signupForm" class="row g-4">
                <div class="col-md-6">
                    <label>First Name</label>
                    <input type="text" class="form-control" id="firstName" placeholder="First Name" required>
                </div>
                <div class="col-md-6">
                    <label>Last Name</label>
                    <input type="text" class="form-control" id="lastName" placeholder="Last Name" required>
                </div>

                <div class="col-12">
                    <label>Email</label>
                    <input type="email" class="form-control" id="email" placeholder="Email" required>
                </div>

                <div class="col-md-6">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" id="password" required>
                        <i class="bi bi-eye password-toggle" id="togglePassword"></i>
                    </div>
                    <small class="min-char">Minimum of 8 characters</small>
                </div>

                <div class="col-md-6">
                    <label>Account Type</label>
                    <select class="form-control mt-2" id="roleSelect" required>
                        <option value="" disabled selected>Select account type</option>
                        <option value="Student">Student</option>
                        <option value="Employer">Employer</option>
                    </select>
                </div>

                <div class="col-12 d-none" id="studentFields">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label>University</label>
                            <input type="text" class="form-control" id="university" placeholder="University name">
                        </div>
                        <div class="col-md-6">
                            <label>Program Name</label>
                            <input type="text" class="form-control" id="programName" placeholder="Program or major">
                        </div>
                        <div class="col-md-4">
                            <label>Graduation Year</label>
                            <input type="number" class="form-control" id="graduationYear" placeholder="2026">
                        </div>
                        <div class="col-md-4">
                            <label>GPA</label>
                            <input type="number" step="0.01" class="form-control" id="gpa" placeholder="3.50">
                        </div>
                        <div class="col-md-4">
                            <label>Skills</label>
                            <input type="text" class="form-control" id="skills" placeholder="JavaScript, SQL, ...">
                        </div>
                        <div class="col-md-6">
                            <label>Resume URL</label>
                            <input type="url" class="form-control" id="resumeUrl" placeholder="https://...">
                        </div>
                        <div class="col-md-6">
                            <label>Portfolio URL</label>
                            <input type="url" class="form-control" id="portfolioUrl" placeholder="https://...">
                        </div>
                    </div>
                </div>

                <div class="col-12 d-none" id="employerFields">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label>Organization Name</label>
                            <input type="text" class="form-control" id="organizationName" placeholder="Organization name">
                        </div>
                        <div class="col-md-6">
                            <label>Industry</label>
                            <input type="text" class="form-control" id="industry" placeholder="Industry">
                        </div>
                        <div class="col-md-6">
                            <label>Website</label>
                            <input type="url" class="form-control" id="website" placeholder="https://...">
                        </div>
                        <div class="col-md-6">
                            <label>Location</label>
                            <input type="text" class="form-control" id="location" placeholder="City, Country">
                        </div>
                    </div>
                </div>

                <div class="col-12">
                    <button type="submit" class="btn-submit">SUBMIT</button>
                </div>
            </form>
        </div>

        <!-- Image Side (exactly like your reference photo) -->
        <div class="image-side" style="background-image: url('img/office_team.jpg');"></div>
    </div>
</div>

<footer class="footer mt-4">
    <div class="container-fluid px-4 px-lg-5 py-5 bg-dark text-light">
        <div class="row">
            <div class="col-md-4 mb-4">
                <h5 class="fw-bold text-white">BetterLink</h5>
                <p>Your journey to success starts here.</p>
            </div>

            <div class="col-md-4 mb-4">
                <h5 class="fw-bold text-white">Quick Links</h5>
                <ul class="list-unstyled">
                    <li><a href="Home.html" class="text-light">Home</a></li>
                    <li><a href="Communities.html" class="text-light">Communities</a></li>
                    <li><a href="Jobs.html" class="text-light">Jobs</a></li>
                    <li><a href="Service.html" class="text-light">Services</a></li>
                    <li><a href="About Us.html" class="text-light">About Us</a></li>
                    <li><a href="ContactUs.html" class="text-light">Contact Us</a></li>
                </ul>
            </div>

            <div class="col-md-4 mb-4">
                <h5 class="fw-bold text-white">Follow Us</h5>
                <p class="mb-3">Stay connected with us on social media.</p>
                <div class="d-flex gap-3 fs-4">
                    <a href="#" class="text-light"><i class="bi bi-facebook"></i></a>
                    <a href="#" class="text-light"><i class="bi bi-twitter"></i></a>
                    <a href="#" class="text-light"><i class="bi bi-instagram"></i></a>
                    <a href="#" class="text-light"><i class="bi bi-linkedin"></i></a>
                </div>
            </div>
        </div>
    </div>

    <div class="bg-black py-3 text-light">
        <div class="container-fluid px-4 px-lg-5 text-center">
            <small>&copy; 2026 BetterLink. All rights reserved.</small>
        </div>
    </div>
</footer>

<script src="js/api.js"></script>

<script>
    const toggle = document.getElementById('togglePassword');
    const passField = document.getElementById('password');
    const roleSelect = document.getElementById('roleSelect');
    const studentFields = document.getElementById('studentFields');
    const employerFields = document.getElementById('employerFields');
    const signupStatus = document.getElementById('signupStatus');

    toggle.addEventListener('click', () => {
        if (passField.type === "password") {
            passField.type = "text";
            toggle.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            passField.type = "password";
            toggle.classList.replace('bi-eye-slash', 'bi-eye');
        }
    });

    function showStatus(message, kind) {
        signupStatus.className = `alert alert-${kind}`;
        signupStatus.textContent = message;
        signupStatus.classList.remove('d-none');
    }

    function updateRoleFields() {
        const role = roleSelect.value;
        studentFields.classList.toggle('d-none', role !== 'Student');
        employerFields.classList.toggle('d-none', role !== 'Employer');
    }

    roleSelect.addEventListener('change', updateRoleFields);

    document.getElementById('signupForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const role = roleSelect.value;

        signupStatus.classList.add('d-none');

        if (!role) {
            showStatus('Please choose Student or Employer.', 'danger');
            return;
        }

        const fullName = `${firstName} ${lastName}`.trim();

        const payload = {
            email,
            password,
            fullName
        };

        let endpoint = '/api/auth/register/student';

        if (role === 'Student') {
            payload.university = document.getElementById('university').value.trim();
            payload.programName = document.getElementById('programName').value.trim();

            const graduationYear = document.getElementById('graduationYear').value;
            const gpa = document.getElementById('gpa').value;
            const skills = document.getElementById('skills').value.trim();
            const resumeUrl = document.getElementById('resumeUrl').value.trim();
            const portfolioUrl = document.getElementById('portfolioUrl').value.trim();

            if (!payload.university || !payload.programName) {
                showStatus('Please provide your university and program name.', 'danger');
                return;
            }

            if (graduationYear) {
                payload.graduationYear = Number(graduationYear);
            }

            if (gpa) {
                payload.gpa = Number(gpa);
            }

            if (skills) {
                payload.skills = skills;
            }

            if (resumeUrl) {
                payload.resumeUrl = resumeUrl;
            }

            if (portfolioUrl) {
                payload.portfolioUrl = portfolioUrl;
            }
        } else {
            endpoint = '/api/auth/register/employer';
            payload.organizationName = document.getElementById('organizationName').value.trim();
            payload.industry = document.getElementById('industry').value.trim() || null;
            payload.website = document.getElementById('website').value.trim() || null;
            payload.location = document.getElementById('location').value.trim() || null;

            if (!payload.organizationName) {
                showStatus('Please provide your organization name.', 'danger');
                return;
            }
        }

        try {
            const result = await window.BetterLinkApi.requestJson(endpoint, {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            window.BetterLinkApi.setAuthSession(result);
            showStatus('Registration successful. Redirecting...', 'success');
            window.location.href = 'Home.html';
        } catch (error) {
            showStatus(error.message || 'Registration failed. Please try again.', 'danger');
        }
    });

    updateRoleFields();

    window.addEventListener('DOMContentLoaded', () => {
        if (!window.BetterLinkApi.isAuthenticated()) {
            return;
        }

        window.location.href = 'Profile.html';
    });
</script>

</body>
</html>
