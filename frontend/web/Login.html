<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – BetterLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="CSS/public.css">
</head>
<body>

<nav class="pub-nav">
    <a class="brand" href="Home.html">BetterLink</a>
    <ul class="nav-links">
        <li><a href="Home.html">Home</a></li>
        <li><a href="Service.html">Services</a></li>
        <li><a href="About Us.html">About Us</a></li>
        <li><a href="ContactUs.html">Contact Us</a></li>
    </ul>
    <div class="nav-actions">
        <a href="SignUp.html" class="btn-solid">Sign Up</a>
    </div>
</nav>

<div class="auth-wrap">
    <div class="auth-card">
        <h2>Welcome back</h2>
        <p class="auth-sub">Sign in to your BetterLink account</p>

        <div class="auth-error" id="errorBanner"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="email">Email</label>
                <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
            </div>

            <div class="mb-3">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            </div>

            <p class="auth-hint">
                Don't have an account? <a href="SignUp.html" class="auth-link">Sign Up</a>
            </p>

            <button type="submit" class="btn-auth" id="submitBtn">Login</button>
        </form>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    if (getToken()) window.location.replace('Feed.html');

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorBanner = document.getElementById('errorBanner');
        errorBanner.classList.remove('show');

        if (!email || !password) {
            errorBanner.textContent = 'Please enter your email and password.';
            errorBanner.classList.add('show');
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.textContent = 'Logging in...';

        try {
            const result = await apiFetch('/api/auth/login', {
                method: 'POST',
                body: JSON.stringify({ email, password }),
            });

            if (!result) return;

            setAuth(result.token, {
                userId:    result.userId,
                email:     result.email,
                role:      result.role,
                firstName: result.firstName || '',
            });

            window.location.replace('Feed.html');
        } catch (err) {
            errorBanner.textContent = err.message || 'Login failed. Please check your credentials.';
            errorBanner.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Login';
        }
    });
</script>
</body>
</html>
