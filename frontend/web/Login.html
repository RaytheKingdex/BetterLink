<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/Login.css">
</head>
<body>

<div class="login-card">
    <h1>Login</h1>
    <p class="text-muted small mb-3">Demo student: student.demo@betterlink.local / Password1</p>
    <div class="alert d-none" id="loginStatus" role="alert"></div>
    
    <form id="loginForm">
        <div class="mb-3">
            <input type="email" class="form-control" id="email" placeholder="Enter email" required>
            <span class="text-danger" id="emailError"></span>
        </div>

        <div class="mb-3">
            <input type="password" class="form-control" id="password" placeholder="Enter password" required>
            <span class="text-danger" id="passlength"></span>
        </div>

        <a href="ForgotPassword.html" class="forgot-password">Forget Password?</a>

        <div class="member">
            Not a member? <a href="SignUp.html">Register here</a>
        </div>

        <button type="submit" class="btn-login">Login</button>
    </form>
</div>

<script src="js/api.js"></script>

<script>
    const form = document.getElementById('loginForm');
    const statusBox = document.getElementById('loginStatus');

    function showStatus(message, kind) {
        statusBox.className = `alert alert-${kind}`;
        statusBox.textContent = message;
        statusBox.classList.remove('d-none');
    }

    form.addEventListener('submit', async function(event) {
        event.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        document.getElementById('emailError').innerText = '';
        document.getElementById('passlength').innerText = '';
        statusBox.classList.add('d-none');

        let valid = true;

        if (email === '') {
            document.getElementById('emailError').innerText = 'Email cannot be empty!';
            valid = false;
        }

        if (password === '') {
            document.getElementById('passlength').innerText = 'Password cannot be empty!';
            valid = false;
        }

        if (!valid) {
            return;
        }

        try {
            const result = await window.BetterLinkApi.requestJson('/api/auth/login', {
                method: 'POST',
                body: JSON.stringify({ email, password })
            });

            window.BetterLinkApi.setAuthSession(result);
            showStatus('Login successful. Redirecting...', 'success');
            window.location.href = 'Home.html';
        } catch (error) {
            showStatus(error.message || 'Login failed. Please try again.', 'danger');
        }
    });
</script>

</body>
</html>
